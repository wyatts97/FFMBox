services:
  ffmbox:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ffmbox
    image: ffmbox:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    volumes:
      - ffmbox_uploads:/app/uploads
      - ffmbox_output:/app/output
      - ffmbox_logs:/app/logs

volumes:
  ffmbox_uploads:
  ffmbox_output:
  ffmbox_logs:
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1GB
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  uploads:
  output:
  logs:
