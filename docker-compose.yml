services:
  ffmbox:
    build:
      context: .
      dockerfile: ./server/Dockerfile
      target: builder
    environment:
      - NODE_ENV=production
      - PORT=6900
      - UPLOAD_DIR=/app/uploads
      - OUTPUT_DIR=/app/output
      - MAX_FILE_SIZE=500MB
      - FFMPEG_THREADS=2
      - CORS_ORIGIN=http://localhost:3000
    volumes:
      - ffmbox_uploads:/app/uploads
      - ffmbox_output:/app/output
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:6900/api/health",
        ]
      interval: 30s
      timeout: 3s
      retries: 3

  nginx:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=/api
    ports:
      - "6900:80"
    depends_on:
      ffmbox:
        condition: service_healthy
    restart: unless-stopped
    environment:
      - NGINX_ENV=production

volumes:
  ffmbox_uploads:
  ffmbox_output:
