services:
  ffmbox:
    build:
      context: ./server
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=${PORT}
      - HOST=${HOST:-0.0.0.0}
      - UPLOAD_DIR=${UPLOAD_DIR}
      - OUTPUT_DIR=${OUTPUT_DIR}
      - MAX_FILE_SIZE=${MAX_FILE_SIZE}
      - FFMPEG_THREADS=${FFMPEG_THREADS}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - NODE_OPTIONS=${NODE_OPTIONS}
    working_dir: /app
    user: "1000:0"  # node user with root group for better compatibility
    volumes:
      - ffmbox_uploads:/app/uploads
      - ffmbox_output:/app/output
      - ffmbox_logs:/app/logs
    ports:
      - "${PORT}:${PORT}"
      - "9229:9229"  # For Node.js debugger
    healthcheck:
      test: ["CMD", "/healthcheck.sh"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    tmpfs:
      - /tmp
      - /run
      - /var/run

  nginx:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-/api}
    ports:
      - "6900:80"
    depends_on:
      ffmbox:
        condition: service_healthy
    restart: unless-stopped
    environment:
      - NGINX_ENV=production
    volumes:
      - nginx_cache:/var/cache/nginx
      - nginx_logs:/var/log/nginx

volumes:
  ffmbox_uploads:
  ffmbox_output:
  ffmbox_logs:
  nginx_cache:
  nginx_logs:
