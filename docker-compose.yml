services:
  ffmbox:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ffmbox
    image: ffmbox:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - UPLOAD_DIR=/app/uploads
      - OUTPUT_DIR=/app/output
      - LOG_DIR=/app/logs
      - FFMPEG_PATH=/usr/bin/ffmpeg
      - MAX_CONCURRENT_CONVERSIONS=2
    volumes:
      - ffmbox_uploads:/app/uploads
      - ffmbox_output:/app/output
      - ffmbox_logs:/app/logs

    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1GB
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  ffmbox_uploads:
  ffmbox_output:
  ffmbox_logs: