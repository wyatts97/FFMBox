services:
  ffmbox:
    build: .

    volumes:
      - ./uploads:/app/server/uploads
      - ./output:/app/server/output
    environment:
      - NODE_ENV=production
      - PORT=6900
    restart: unless-stopped
    
  nginx:
    image: nginx:alpine
    ports:
      - "6900:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./dist:/usr/share/nginx/html
    depends_on:
      - ffmbox
    restart: unless-stopped
