services:
  ffmbox:
    build:
      context: .
      dockerfile: ./server/Dockerfile
      target: builder
    environment:
      - NODE_ENV=development
      - DEBUG=*
      - PORT=6900
      - UPLOAD_DIR=/app/uploads
      - OUTPUT_DIR=/app/output
      - MAX_FILE_SIZE=500MB
      - FFMPEG_THREADS=2
      - CORS_ORIGIN=*
    volumes:
      - ./server:/app
      - ffmbox_uploads:/app/uploads
      - ffmbox_output:/app/output
    restart: unless-stopped
    ports:
      - "6900:6900"
      - "9229:9229"  # For Node.js debugger
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:6900/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=/api
    ports:
      - "6900:80"
    depends_on:
      ffmbox:
        condition: service_healthy
    restart: unless-stopped
    environment:
      - NGINX_ENV=production

volumes:
  ffmbox_uploads:
  ffmbox_output:
