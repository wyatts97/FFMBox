services:
  ffmbox:
    build:
      context: ./server
    volumes:
      - ./uploads:/app/uploads
      - ./output:/app/output
    environment:
      - NODE_ENV=production
      - PORT=6900
    restart: unless-stopped
    
  nginx:
    build:
      context: .
      target: nginx
    ports:
      - "6900:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - ffmbox
    restart: unless-stopped
